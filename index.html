<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>examIA – Convierte cualquier PDF en un examen tipo test</title>
  <meta name="description" content="Sube tus apuntes y la IA crea exámenes tipo test personalizados. Empieza gratis." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b0f1a; --surface: #131829; --surface2: #1a2035; --surface3: #212840;
      --border: rgba(255,255,255,0.08); --border-hover: rgba(255,255,255,0.15);
      --text: #edf0f7; --muted: #7a8099; --hint: #4a5068;
      --gold: #e8b84b; --gold-dim: rgba(232,184,75,0.12); --gold-glow: rgba(232,184,75,0.25);
      --green: #4ade80; --green-dim: rgba(74,222,128,0.1);
      --red: #f87171; --red-dim: rgba(248,113,113,0.1);
      --r: 12px; --r-sm: 8px; --r-lg: 18px;
      --font-head: 'Lora', Georgia, serif; --font-body: 'DM Sans', system-ui, sans-serif;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100vh; }
    a { color: inherit; }

    .examia-app { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); position: relative; }
    .glow-orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }
    .glow-orb-1 { width: 700px; height: 700px; top: -250px; left: 50%; transform: translateX(-50%); background: radial-gradient(circle, rgba(232,184,75,0.08) 0%, transparent 65%); }
    .glow-orb-2 { width: 500px; height: 500px; bottom: -150px; right: -100px; background: radial-gradient(circle, rgba(96,165,250,0.05) 0%, transparent 70%); }

    .header { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 60px; background: rgba(11,15,26,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
    .logo-badge { width: 34px; height: 34px; border-radius: 10px; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-family: var(--font-head); font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text b { color: var(--gold); font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .header-meta { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; }
    .header-icon { color: var(--muted); font-size: 15px; cursor: default; }
    .nav-pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .nav-pill:hover { border-color: var(--border-hover); color: var(--text); background: var(--surface2); }
    .nav-pill.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .panel-btn { padding: 8px 18px; border-radius: 10px; background: var(--gold); color: #0b0f1a; border: none; font-family: var(--font-body); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.18s; }
    .panel-btn:hover { background: #f0c75c; box-shadow: 0 4px 16px var(--gold-glow); }
    .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; font-size: 11px; font-weight: 600; background: var(--red); color: white; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 0 20px; height: 42px; border-radius: var(--r-sm); font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.18s; border: 1px solid transparent; white-space: nowrap; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
    .btn-gold { background: var(--gold); color: #0b0f1a; border-color: var(--gold); }
    .btn-gold:hover:not(:disabled) { background: #f0c75c; box-shadow: 0 4px 20px var(--gold-glow); transform: translateY(-1px); }
    .btn-ghost { background: var(--surface2); color: var(--text); border-color: var(--border); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--border-hover); background: var(--surface3); }
    .btn-outline { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-outline:hover:not(:disabled) { color: var(--gold); border-color: var(--gold); background: var(--gold-dim); }
    .btn-danger-outline { background: transparent; color: var(--red); border-color: rgba(248,113,113,0.3); }
    .btn-danger-outline:hover:not(:disabled) { background: var(--red-dim); border-color: var(--red); }
    .btn-lg { height: 52px; padding: 0 30px; font-size: 16px; border-radius: 12px; }

    /* ── LANDING ── */
    .landing { position: relative; z-index: 1; }
    .hero { max-width: 820px; margin: 0 auto; padding: 80px 24px 40px; text-align: center; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: 24px; border: 1px solid rgba(232,184,75,0.3); background: var(--gold-dim); color: var(--gold); font-size: 13px; font-weight: 600; margin-bottom: 28px; }
    .hero h1 { font-family: var(--font-head); font-size: clamp(38px, 7vw, 66px); font-weight: 700; line-height: 1.08; letter-spacing: -1px; margin-bottom: 22px; }
    .hero h1 em { color: var(--gold); font-style: italic; }
    .hero-sub { font-size: 18px; color: var(--muted); line-height: 1.65; max-width: 580px; margin: 0 auto 36px; }
    .hero-cta { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    .hero-note { font-size: 14px; color: var(--hint); }

    .preview-card { max-width: 760px; margin: 24px auto 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 20px; box-shadow: 0 30px 80px rgba(0,0,0,0.5); position: relative; z-index: 1; }
    .preview-inner { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 14px; }
    .preview-label { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    .preview-title { font-family: var(--font-head); font-size: 28px; font-weight: 700; margin-bottom: 10px; }
    .preview-file { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 14px; }
    .preview-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .preview-stat { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r); padding: 18px; }
    .preview-stat-label { color: var(--muted); font-size: 13px; margin-bottom: 8px; }
    .preview-stat-value { font-family: var(--font-head); font-size: 30px; font-weight: 700; margin-bottom: 12px; }
    .preview-stat-value small { font-size: 16px; color: var(--muted); }
    .preview-bar { height: 8px; border-radius: 4px; background: var(--surface3); overflow: hidden; }
    .preview-bar span { display: block; height: 100%; border-radius: 4px; }

    .section { max-width: 820px; margin: 0 auto; padding: 70px 24px; position: relative; z-index: 1; }
    .section-title { font-family: var(--font-head); font-size: clamp(30px, 5vw, 44px); font-weight: 700; text-align: center; margin-bottom: 12px; letter-spacing: -0.5px; }
    .section-sub { text-align: center; color: var(--muted); font-size: 17px; margin-bottom: 48px; }

    .feature { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 32px; margin-bottom: 16px; transition: all 0.25s; }
    .feature:hover { border-color: rgba(232,184,75,0.4); box-shadow: 0 0 40px rgba(232,184,75,0.08); }
    .feature-icon { width: 52px; height: 52px; border-radius: 14px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 20px; }
    .feature h3 { font-family: var(--font-head); font-size: 22px; font-weight: 600; margin-bottom: 10px; }
    .feature p { color: var(--muted); font-size: 15px; line-height: 1.6; }

    .testimonial { text-align: left; }
    .stars { color: var(--gold); font-size: 22px; letter-spacing: 3px; margin-bottom: 20px; }
    .testimonial-quote { font-family: var(--font-head); font-style: italic; font-size: 28px; line-height: 1.4; font-weight: 500; margin-bottom: 18px; }
    .testimonial-author { color: var(--muted); font-size: 16px; }
    .ad-box { margin-top: 40px; border: 1.5px dashed var(--border); border-radius: var(--r-lg); padding: 60px 24px; text-align: center; }
    .ad-box .ad-tag { font-size: 12px; color: var(--hint); letter-spacing: 2px; margin-bottom: 8px; }
    .ad-box .ad-text { color: var(--muted); font-size: 15px; }

    .pricing-grid { display: grid; gap: 16px; }
    .price-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 32px; position: relative; }
    .price-card.popular { border-color: var(--gold); box-shadow: 0 0 50px rgba(232,184,75,0.12); }
    .price-popular-tag { position: absolute; top: -13px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #0b0f1a; font-size: 12px; font-weight: 700; padding: 4px 14px; border-radius: 20px; }
    .price-name { font-family: var(--font-head); font-size: 26px; font-weight: 700; margin-bottom: 14px; }
    .price-amount { font-family: var(--font-head); font-size: 44px; font-weight: 700; margin-bottom: 22px; }
    .price-amount small { font-size: 17px; color: var(--muted); font-weight: 400; }
    .price-feat { display: flex; align-items: center; gap: 10px; font-size: 15px; margin-bottom: 12px; }
    .price-feat .check { color: var(--green); font-weight: 700; }
    .price-card .btn { width: 100%; margin-top: 22px; }

    .final-cta { text-align: center; }
    .final-cta .shield { font-size: 40px; color: var(--gold); margin-bottom: 16px; }
    .final-cta h2 { font-family: var(--font-head); font-size: clamp(30px, 5vw, 46px); font-weight: 700; margin-bottom: 28px; }

    .footer { border-top: 1px solid var(--border); padding: 50px 24px 30px; position: relative; z-index: 1; }
    .footer-inner { max-width: 820px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 30px; }
    .footer-brand .logo { margin-bottom: 14px; }
    .footer-brand p { color: var(--muted); font-size: 14px; line-height: 1.6; max-width: 260px; }
    .footer-col h4 { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
    .footer-col a { display: block; color: var(--muted); font-size: 14px; margin-bottom: 12px; text-decoration: none; cursor: pointer; transition: color 0.2s; }
    .footer-col a:hover { color: var(--gold); }
    .footer-bottom { max-width: 820px; margin: 40px auto 0; padding-top: 24px; border-top: 1px solid var(--border); text-align: center; color: var(--hint); font-size: 13px; }

    /* ── APP ── */
    .main { flex: 1; max-width: 820px; width: 100%; margin: 0 auto; padding: 48px 24px 80px; position: relative; z-index: 1; }
    .free-banner { display: flex; align-items: center; gap: 10px; justify-content: center; padding: 10px 16px; background: var(--gold-dim); border-bottom: 1px solid rgba(232,184,75,0.2); font-size: 13px; color: var(--gold); position: relative; z-index: 2; }
    .upload-zone { border: 1.5px dashed var(--border); border-radius: var(--r); padding: 64px 40px; text-align: center; cursor: pointer; transition: all 0.25s; background: var(--surface); position: relative; overflow: hidden; }
    .upload-zone::before { content: ''; position: absolute; inset: 0; background: var(--gold-dim); opacity: 0; transition: opacity 0.25s; }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--gold); }
    .upload-zone:hover::before, .upload-zone.dragover::before { opacity: 1; }
    .upload-icon { font-size: 40px; margin-bottom: 14px; position: relative; z-index: 1; }
    .upload-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; position: relative; z-index: 1; }
    .upload-hint { font-size: 13px; color: var(--muted); position: relative; z-index: 1; }
    .app-hero-label { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .app-hero-title { font-family: var(--font-head); font-size: clamp(32px, 6vw, 50px); font-weight: 700; line-height: 1.1; letter-spacing: -0.5px; margin-bottom: 14px; }
    .app-hero-title em { color: var(--gold); font-style: italic; }
    .app-hero-sub { font-size: 16px; color: var(--muted); line-height: 1.7; margin-bottom: 40px; max-width: 500px; }
    .divider { display: flex; align-items: center; gap: 16px; margin: 32px 0; color: var(--hint); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; }
    .fallos-cta { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .fallos-cta-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .fallos-cta-info p { font-size: 13px; color: var(--muted); }
    .qty-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 28px; }
    .qty-btn { background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--r-sm); padding: 16px 8px; cursor: pointer; font-family: var(--font-body); font-size: 22px; font-weight: 600; color: var(--muted); transition: all 0.18s; text-align: center; }
    .qty-btn:hover { border-color: var(--border-hover); color: var(--text); }
    .qty-btn.selected { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
    .config-wrap { max-width: 440px; margin: 40px auto; }
    .config-title { font-family: var(--font-head); font-size: 30px; font-weight: 700; margin-bottom: 6px; }
    .config-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .file-pill { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: var(--gold-dim); border: 1px solid rgba(232,184,75,0.25); border-radius: var(--r-sm); margin-bottom: 28px; }
    .file-pill-icon { font-size: 22px; flex-shrink: 0; }
    .file-pill-name { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-pill-size { font-size: 12px; color: var(--muted); }
    .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); padding: 28px; margin-bottom: 16px; transition: border-color 0.3s; }
    .q-card.correct-card { border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.03); }
    .q-card.wrong-card { border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.03); }
    .q-num { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .q-text { font-family: var(--font-head); font-size: 19px; font-weight: 500; line-height: 1.5; margin-bottom: 22px; }
    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .opt-btn { display: flex; align-items: flex-start; gap: 11px; padding: 13px 16px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--r-sm); cursor: pointer; font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--text); text-align: left; line-height: 1.5; transition: all 0.18s; }
    .opt-btn:hover:not(:disabled):not(.opt-selected):not(.opt-correct):not(.opt-wrong) { border-color: rgba(232,184,75,0.4); background: var(--gold-dim); }
    .opt-btn:disabled { cursor: default; }
    .opt-btn.opt-selected { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
    .opt-btn.opt-correct { border-color: var(--green); background: var(--green-dim); color: var(--green); }
    .opt-btn.opt-wrong { border-color: var(--red); background: var(--red-dim); color: var(--red); }
    .opt-letter { width: 22px; height: 22px; min-width: 22px; border-radius: 5px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; transition: all 0.18s; margin-top: 1px; }
    .opt-btn.opt-selected .opt-letter { background: var(--gold); color: #0b0f1a; }
    .opt-btn.opt-correct .opt-letter { background: var(--green); color: #0b0f1a; }
    .opt-btn.opt-wrong .opt-letter { background: var(--red); color: white; }
    .explanation { margin-top: 14px; padding: 12px 16px; background: var(--surface2); border-left: 2.5px solid var(--gold); border-radius: 0 var(--r-sm) var(--r-sm) 0; font-size: 13px; color: var(--muted); line-height: 1.6; }
    .explanation strong { color: var(--text); }
    .sticky-bar { position: sticky; bottom: 0; z-index: 50; background: rgba(11,15,26,0.92); backdrop-filter: blur(16px); border-top: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .progress-info { font-size: 13px; color: var(--muted); }
    .progress-info strong { color: var(--text); }
    .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .tag-green { background: var(--green-dim); color: var(--green); }
    .tag-red { background: var(--red-dim); color: var(--red); }
    .results-hero { text-align: center; padding: 48px 32px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 24px; }
    .score-circle { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid var(--gold); background: var(--gold-dim); box-shadow: 0 0 40px var(--gold-glow); }
    .score-num { font-family: var(--font-head); font-size: 36px; font-weight: 700; color: var(--gold); line-height: 1; }
    .score-pct { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .score-msg { font-family: var(--font-head); font-size: 24px; font-weight: 500; margin-bottom: 8px; }
    .score-sub { font-size: 14px; color: var(--muted); }
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
    .stat-box { padding: 20px; border-radius: var(--r-sm); text-align: center; }
    .stat-box.g { background: var(--green-dim); border: 1px solid rgba(74,222,128,0.2); }
    .stat-box.r { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.2); }
    .stat-n { font-family: var(--font-head); font-size: 36px; font-weight: 700; }
    .stat-box.g .stat-n { color: var(--green); }
    .stat-box.r .stat-n { color: var(--red); }
    .stat-l { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .fallos-notice { padding: 14px 18px; background: var(--red-dim); border: 1px solid rgba(248,113,113,0.2); border-radius: var(--r-sm); font-size: 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .actions-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 28px; }
    .loading-view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; gap: 24px; text-align: center; }
    .spinner { width: 44px; height: 44px; border: 2.5px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-title { font-family: var(--font-head); font-size: 26px; font-weight: 500; margin-bottom: 6px; }
    .loading-sub { font-size: 14px; color: var(--muted); }
    .loading-dots { display: flex; gap: 6px; margin-top: 14px; justify-content: center; }
    .loading-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: pulse 1.2s ease-in-out infinite; }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1)} }
    .fallos-page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .page-title { font-family: var(--font-head); font-size: 34px; font-weight: 700; margin-bottom: 6px; }
    .page-sub { font-size: 14px; color: var(--muted); }
    .empty-state { text-align: center; padding: 80px 24px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-family: var(--font-head); font-size: 22px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
    .empty-sub { font-size: 14px; }
    .fallo-item { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid rgba(248,113,113,0.4); border-radius: var(--r); padding: 18px 20px; margin-bottom: 10px; }
    .fallo-q { font-size: 15px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; }
